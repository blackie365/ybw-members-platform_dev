<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<div style="background-color:#FAF8F5;margin:0;padding:0">
  <table cellPadding="0" cellSpacing="0" width="100%" style="background-color:#FAF8F5">
    <tbody>
      <tr>
        <td align="center" style="padding:40px 16px">
          <table cellPadding="0" cellSpacing="0" width="100%" style="max-width:640px;background-color:#FFFFFF;border-radius:2px">
            <tbody>
              <tr>
                <td style="padding:40px 40px 32px 40px;border-bottom:1px solid #e7e5e4">
                  <table cellPadding="0" cellSpacing="0" width="100%">
                    <tbody>
                      <tr>
                        <td align="center">
                          <img src="https://yorkshirebusinesswoman.co.uk/images/logo-nav-v3.png" alt="Yorkshire Businesswoman" style="max-height:48px;width:auto;display:block"/>
                        </td>
                      </tr>
                      <tr>
                        <td align="center" style="padding-top:20px">
                          <p style="font-family:sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#b79c65;margin:0">Daily News Digest</p>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td style="padding:40px 40px 40px 40px">
                  <table cellPadding="0" cellSpacing="0" width="100%">
                    <tbody>
                      <tr>
                        <td align="center">
                          <p style="font-family:sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#57534e;margin:0 0 16px 0">{{current_date_full}}</p>
                          <h1 style="font-family:serif;font-size:32px;font-weight:400;color:#1c1917;margin:0 0 12px 0;line-height:1.2">Good morning, {{first_name | Friend}}.</h1>
                          <p style="font-family:sans-serif;font-size:16px;line-height:1.6;color:#57534e;margin:0">Here is your daily briefing from Yorkshire Businesswoman.</p>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <!-- BEEHIIV RSS BLOCK SHOULD BE INSERTED BELOW THIS LINE IN THE EDITOR -->
            </tbody>
          </table>
        </td>
      </tr>
    </tbody>
  </table>
</div>
